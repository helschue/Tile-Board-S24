<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Tile Board</title>
  <style>
    :root {
      --bg: #080b10;
      --panel: #111722;
      --panel2: #172131;
      --text: #eef4ff;
      --muted: #9aa8bd;
      --accent: #4da3ff;
      --ok: #30d158;
      --warn: #ff9f0a;
      --danger: #ff453a;
      --line: rgba(255,255,255,.11);
      --shadow: 0 14px 30px rgba(0,0,0,.35);
      --zoom: 1;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
    }

    body {
      overflow: hidden;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 50% -10%, rgba(77,163,255,.22), transparent 36%),
        linear-gradient(180deg, #0b1018 0%, #07090d 100%);
    }

    header {
      height: 56px;
      min-height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(8,11,16,.86);
      backdrop-filter: blur(14px);
      z-index: 20;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      color: var(--text);
      display: grid;
      place-items: center;
      font-size: 22px;
      cursor: pointer;
    }

    .title-block {
      flex: 1;
      min-width: 0;
    }

    .title {
      font-weight: 800;
      letter-spacing: .2px;
      font-size: 18px;
      line-height: 1.05;
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .menu {
      position: fixed;
      left: 10px;
      top: 62px;
      width: min(330px, calc(100vw - 20px));
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(17,23,34,.98);
      box-shadow: var(--shadow);
      padding: 10px;
      z-index: 50;
      display: none;
    }

    .menu.open { display: block; }

    .menu button, .menu label {
      width: 100%;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      margin: 4px 0;
      color: var(--text);
      background: rgba(255,255,255,.055);
      border: 1px solid var(--line);
      border-radius: 13px;
      text-align: left;
      cursor: pointer;
    }

    .menu button.danger { color: #ffd5d2; border-color: rgba(255,69,58,.35); }
    .menu select {
      color: var(--text);
      background: #0b111b;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 8px;
    }

    main {
      flex: 1;
      overflow: auto;
      padding: 12px 10px 94px;
      scroll-behavior: smooth;
    }

    .scale-wrap {
      width: 100%;
      min-height: 100%;
      transform: scale(var(--zoom));
      transform-origin: top left;
    }

    .board {
      position: relative;
      width: calc(100vw - 20px);
      min-height: 820px;
    }

    .tile {
      position: absolute;
      width: calc((100vw - 52px) / 4);
      height: 132px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.065), transparent 40%),
        var(--panel);
      box-shadow: 0 10px 20px rgba(0,0,0,.24);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
      user-select: none;
    }

    .tile.done {
      border: 3px solid #30d158;
      background:
        linear-gradient(180deg, rgba(48,209,88,.16), transparent 42%),
        #101a17;
      box-shadow:
        0 0 0 2px rgba(48,209,88,.18),
        0 10px 20px rgba(0,0,0,.24);
    }

    .tile-head {
      position: relative;
      display: block;
      padding: 7px 5px 0;
      min-height: 34px;
    }

    .tile-name {
      display: block;
      width: 100%;
      min-height: 34px;
      max-height: 34px;
      font-weight: 500;
      font-size: 13px;
      line-height: 1.12;
      text-align: left;
      outline: none;
      padding: 2px 24px 3px 3px;
      border-radius: 9px;
      overflow-wrap: anywhere;
      word-break: normal;
      hyphens: auto;
      overflow: hidden;
    }

    .tile-name:focus {
      background: rgba(77,163,255,.16);
      box-shadow: inset 0 0 0 1px rgba(77,163,255,.45);
    }

    .thumb {
      position: absolute;
      right: 4px;
      top: 6px;
      width: 21px;
      height: 21px;
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      overflow: hidden;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 11px;
      opacity: .92;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tile-mid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4px;
      padding: 4px 6px 4px;
      align-items: stretch;
    }

    .toggle, .weight-btn {
      min-height: 28px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.07);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
    }

    .toggle.done {
      color: #d6ffdf;
      background: rgba(48,209,88,.2);
      border-color: rgba(48,209,88,.45);
    }

    .tile-mid > .weight-display { display: none; }

    .weight {
      grid-column: 1;
      display: grid;
      grid-template-columns: 26px 1fr 26px;
      gap: 7px;
      align-items: center;
    }

    .weight-display {
      min-height: 28px;
      border-radius: 12px;
      background: rgba(255,255,255,.045);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #dcecff;
    }

    .drag-handle {
      margin-top: auto;
      height: 25px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.045);
      display: grid;
      place-items: center;
      cursor: grab;
      touch-action: none;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 3px;
    }

    .drag-handle:active { cursor: grabbing; }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 8px 10px calc(8px + var(--safe-bottom));
      border-top: 1px solid var(--line);
      background: rgba(8,11,16,.90);
      backdrop-filter: blur(14px);
      z-index: 25;
      display: grid;
      grid-template-columns: 42px 42px 1fr 42px 42px 42px;
      gap: 8px;
      align-items: center;
    }

    .zoom-readout {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.055);
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #dcecff;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.84);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open { display: flex; }

    .camera-box, .gallery-box, .lightbox-box {
      width: min(680px, 100%);
      max-height: 92dvh;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #0e1420;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .overlay-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .overlay-head h2 {
      font-size: 18px;
      margin: 0;
      flex: 1;
    }

    video {
      width: 100%;
      aspect-ratio: 9 / 14;
      max-height: 72dvh;
      object-fit: cover;
      border-radius: 18px;
      background: #000;
      transform-origin: center;
    }

    .camera-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .primary, .secondary, .danger-btn {
      min-height: 44px;
      border-radius: 14px;
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 850;
      cursor: pointer;
    }

    .primary { background: rgba(77,163,255,.24); border-color: rgba(77,163,255,.45); }
    .secondary { background: rgba(255,255,255,.065); }
    .danger-btn { background: rgba(255,69,58,.16); border-color: rgba(255,69,58,.4); }

    .capture-active {
      background: rgba(48,209,88,.35) !important;
      border-color: rgba(48,209,88,.9) !important;
      color: #eaffef !important;
      animation: capturePulse .55s ease-out 0s 2;
      transform: scale(.98);
    }

    @keyframes capturePulse {
      0% { box-shadow: 0 0 0 0 rgba(48,209,88,.75); }
      100% { box-shadow: 0 0 0 14px rgba(48,209,88,0); }
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .photo-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.045);
      overflow: hidden;
      cursor: pointer;
    }

    .photo-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .photo-card div {
      padding: 7px 8px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lightbox-img {
      width: 100%;
      max-height: 72dvh;
      object-fit: contain;
      background: #000;
      border-radius: 16px;
      display: block;
    }

    .lightbox-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .log-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .log-table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      max-height: 68dvh;
    }

    .log-table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      font-size: 12px;
    }

    .log-table th,
    .log-table td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 7px 8px;
      text-align: left;
      white-space: nowrap;
    }

    .log-table th {
      position: sticky;
      top: 0;
      background: #151d2b;
      color: #dcecff;
      z-index: 1;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px 10px;
    }

    .ocr-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }

    @media (min-width: 500px) {
      .board { width: min(720px, calc(100vw - 20px)); margin-inline: auto; }
      .tile { width: calc((min(720px, calc(100vw - 20px)) - 32px) / 4); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <button class="icon-btn" id="menuBtn" aria-label="Menü öffnen">☰</button>
      <div class="title-block">
        <div class="title">Tile Board</div>
        <div class="subtitle">Doppeltipp auf Kachel: Foto · Ziehen nur am Griff</div>
      </div>
    </header>

    <nav class="menu" id="menu">
      <button id="resetMarks">Markierungen zurücksetzen</button>
      <button id="resetPositions">Positionen zurücksetzen</button>
      <button id="saveDefaultPositions">Aktuelle Positionen als Standard speichern</button>
      <button id="openLogTable">Tabelle öffnen</button>
      <button id="showStorageInfo">Speicherbelegung anzeigen</button>
      <button id="openGallery">Galerie öffnen</button>
      <button class="danger" id="resetAll">Alles zurücksetzen</button>
      <label>
        <span>Objektiv</span>
        <select id="lensSelect" aria-label="Objektiv auswählen">
          <option value="1">1×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2×</option>
          <option value="2.2">2.2×</option>
        </select>
      </label>
    </nav>

    <main id="scroller">
      <div class="scale-wrap" id="scaleWrap">
        <section class="board" id="board" aria-label="Tile Board"></section>
      </div>
    </main>

    <div class="bottom-bar">
      <button class="icon-btn" id="zoomMinus" aria-label="Verkleinern">−</button>
      <button class="icon-btn" id="zoomPlus" aria-label="Vergrößern">+</button>
      <div class="zoom-readout" id="zoomReadout">100 %</div>
      <button class="icon-btn" id="scrollUp" aria-label="Nach oben">↑</button>
      <button class="icon-btn" id="scrollDown" aria-label="Nach unten">↓</button>
      <button class="icon-btn" id="screenshotBtn" aria-label="Screenshot speichern">⧉</button>
    </div>
  </div>

  <div class="overlay" id="cameraOverlay">
    <div class="camera-box">
      <div class="overlay-head">
        <h2 id="cameraTitle">Foto aufnehmen</h2>
        <button class="icon-btn" id="closeCamera">×</button>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <div class="camera-actions">
        <button class="primary" id="captureBtn">Auslösen</button>
        <button class="secondary" id="cancelCamera">Abbrechen</button>
      </div>
      <div class="ocr-note" id="ocrNote"></div>
    </div>
  </div>

  <div class="overlay" id="galleryOverlay">
    <div class="gallery-box">
      <div class="overlay-head">
        <h2>Galerie</h2>
        <button class="icon-btn" id="closeGallery">×</button>
      </div>
      <div id="galleryGrid" class="gallery-grid"></div>
    </div>
  </div>

  <div class="overlay" id="logOverlay">
    <div class="gallery-box">
      <div class="overlay-head">
        <h2>Trainingsprotokoll</h2>
        <button class="icon-btn" id="closeLogTable">×</button>
      </div>
      <div class="log-actions">
        <button class="primary" id="downloadLogCsv">CSV herunterladen</button>
        <button class="danger-btn" id="clearLogTable">Tabelle löschen</button>
      </div>
      <div class="log-table-wrap" id="logTableWrap"></div>
    </div>
  </div>

  <div class="overlay" id="lightboxOverlay">
    <div class="lightbox-box">
      <div class="overlay-head">
        <h2 id="lightboxTitle">Foto</h2>
        <button class="icon-btn" id="closeLightbox">×</button>
      </div>
      <img id="lightboxImg" class="lightbox-img" alt="Foto" />
      <div class="lightbox-actions">
        <button class="primary" id="downloadPhoto">Download</button>
        <button class="danger-btn" id="deletePhoto">Löschen</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const STORAGE_KEY = "tileBoard.s24.v19.deviceAdaptedDefaults";
    const DEFAULT_POSITIONS_KEY = "tileBoard.s24.defaultPositions.permanent";
    const PHOTO_DB_NAME = "tileBoardPhotosDb";
    const PHOTO_DB_VERSION = 1;
    const PHOTO_STORE = "photos";
    const board = document.getElementById("board");
    const scroller = document.getElementById("scroller");
    const scaleWrap = document.getElementById("scaleWrap");
    const zoomReadout = document.getElementById("zoomReadout");
    const menu = document.getElementById("menu");
    const lensSelect = document.getElementById("lensSelect");

    const defaultNames = [
      "Trizeps",
      "Bizeps",
      "Schulter",
      "Brustpresse",
      "Bein",
      "Bein",
      "Beinpresse",
      "Rudern",
      "Rücken",
      "Bauch"
    ];

    const defaultTiles = Array.from({ length: 10 }, (_, i) => ({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + i),
      name: defaultNames[i],
      done: false,
      weight: 10,
      x: null,
      y: null,
      photoId: null
    }));

    let state = loadState();
    let activeTileId = null;
    let stream = null;
    let activePhotoId = null;
    let saveTimer = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed.tiles?.length === 10) {
            if (!("defaultPositions" in parsed)) parsed.defaultPositions = null;
            if (!parsed.defaultPositions) parsed.defaultPositions = loadPermanentDefaultPositions();
            if (!("history" in parsed)) parsed.history = [];
            parsed.photos = [];
            return parsed;
          }
        }
      } catch(e) {}
      return {
        tiles: defaultTiles,
        zoom: 1,
        lens: 1,
        photos: [],
        defaultPositions: loadPermanentDefaultPositions(),
        history: []
      };
    }

    function saveStateSoon() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveState, 120);
    }

    function saveState() {
      try {
        const lightState = { ...state, photos: [] };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(lightState));
      } catch(e) {
        alert("Der Browser-Speicher ist voll. Bitte Tabelle/Fotos exportieren oder alte Daten löschen.");
      }
    }

    function savePermanentDefaultPositions(positions) {
      try {
        localStorage.setItem(DEFAULT_POSITIONS_KEY, JSON.stringify(positions));
      } catch (e) {
        console.warn("Standardpositionen konnten nicht dauerhaft gespeichert werden.", e);
      }
    }

    function loadPermanentDefaultPositions() {
      try {
        const raw = localStorage.getItem(DEFAULT_POSITIONS_KEY);
        if (!raw) return null;
        const positions = JSON.parse(raw);
        if (!Array.isArray(positions) || positions.length !== 10) return null;

        const cleaned = positions.map(p => ({
          x: Number(p.x),
          y: Number(p.y)
        }));

        if (cleaned.some(p => !Number.isFinite(p.x) || !Number.isFinite(p.y))) return null;
        return cleaned;
      } catch (e) {
        return null;
      }
    }

    function adaptPositionsToCurrentDevice(positions) {
      if (!Array.isArray(positions) || positions.length !== 10) {
        return Array.from({ length: 10 }, (_, i) => defaultPosition(i));
      }

      const g = gridMetrics();
      const cols = g.cols;
      const occupied = new Set();

      return positions.map((p, i) => {
        let col = clamp(Math.round(Number(p.x || 0) / g.stepX), 0, cols - 1);
        let row = Math.max(0, Math.round(Number(p.y || 0) / g.stepY));
        let key = `${col}:${row}`;

        while (occupied.has(key)) {
          col += 1;
          if (col >= cols) {
            col = 0;
            row += 1;
          }
          key = `${col}:${row}`;
        }

        occupied.add(key);
        return {
          x: col * g.stepX,
          y: row * g.stepY
        };
      });
    }

    function adaptAndSaveDefaultsForCurrentDevice() {
      const source =
        state.defaultPositions ||
        loadPermanentDefaultPositions() ||
        state.tiles.map(t => ({ x: t.x, y: t.y }));

      const adapted = adaptPositionsToCurrentDevice(source);
      state.defaultPositions = adapted;
      savePermanentDefaultPositions(adapted);
      return adapted;
    }

    function openPhotoDb() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(PHOTO_DB_NAME, PHOTO_DB_VERSION);

        req.onupgradeneeded = event => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(PHOTO_STORE)) {
            db.createObjectStore(PHOTO_STORE, { keyPath: "id" });
          }
        };

        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function loadPhotosFromDb() {
      try {
        const db = await openPhotoDb();
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(PHOTO_STORE, "readonly");
          const store = tx.objectStore(PHOTO_STORE);
          const req = store.getAll();
          req.onsuccess = () => {
            const photos = req.result || [];
            photos.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            resolve(photos);
          };
          req.onerror = () => reject(req.error);
        });
      } catch (e) {
        console.error(e);
        return [];
      }
    }

    async function savePhotoToDb(photo) {
      const db = await openPhotoDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(PHOTO_STORE, "readwrite");
        tx.objectStore(PHOTO_STORE).put(photo);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    async function deletePhotoFromDb(photoId) {
      const db = await openPhotoDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(PHOTO_STORE, "readwrite");
        tx.objectStore(PHOTO_STORE).delete(photoId);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    async function clearPhotoDb() {
      const db = await openPhotoDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(PHOTO_STORE, "readwrite");
        tx.objectStore(PHOTO_STORE).clear();
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    async function estimateBrowserStorage() {
      if (!navigator.storage?.estimate) return null;
      try {
        return await navigator.storage.estimate();
      } catch (e) {
        return null;
      }
    }

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

    function gridMetrics() {
      const gap = 10;
      const cols = 4;
      const tileW = (board.clientWidth - gap * (cols - 1)) / cols;
      const tileH = 132;
      return {
        gap,
        cols,
        tileW,
        tileH,
        stepX: tileW + gap,
        stepY: tileH + gap
      };
    }

    function snapToGrid(x, y) {
      const g = gridMetrics();
      const col = clamp(Math.round(x / g.stepX), 0, g.cols - 1);
      const row = Math.max(0, Math.round(y / g.stepY));
      return {
        x: col * g.stepX,
        y: row * g.stepY
      };
    }

    function defaultPosition(index) {
      const g = gridMetrics();
      const col = index % g.cols;
      const row = Math.floor(index / g.cols);
      return {
        x: col * g.stepX,
        y: row * g.stepY
      };
    }

    function getResetPosition(index) {
      const saved = state.defaultPositions?.[index];
      if (saved && Number.isFinite(saved.x) && Number.isFinite(saved.y)) {
        const p = snapToGrid(saved.x, saved.y);
        return { x: p.x, y: p.y };
      }
      return defaultPosition(index);
    }

    function saveCurrentPositionsAsDefault() {
      normalizePositions();
      state.defaultPositions = state.tiles.map(tile => {
        const p = snapToGrid(tile.x, tile.y);
        return { x: p.x, y: p.y };
      });
      savePermanentDefaultPositions(state.defaultPositions);
      saveState();
    }

    function normalizePositions() {
      state.tiles.forEach((tile, i) => {
        if (tile.x === null || tile.y === null || Number.isNaN(tile.x) || Number.isNaN(tile.y)) {
          const p = getResetPosition(i);
          tile.x = p.x;
          tile.y = p.y;
        } else {
          const p = snapToGrid(tile.x, tile.y);
          tile.x = p.x;
          tile.y = p.y;
        }
      });
    }

    function setZoom(value) {
      state.zoom = clamp(Math.round(value * 100) / 100, 0.65, 1.6);
      document.documentElement.style.setProperty("--zoom", state.zoom);
      zoomReadout.textContent = `${Math.round(state.zoom * 100)} %`;
      const logicalW = board.offsetWidth * state.zoom;
      const logicalH = board.offsetHeight * state.zoom;
      scaleWrap.style.width = `${logicalW}px`;
      scaleWrap.style.height = `${logicalH}px`;
      saveStateSoon();
    }

    function attachDrag(el, tile) {
      const handle = el.querySelector(".drag-handle");
      let startX = 0, startY = 0, tileX = 0, tileY = 0;

      handle.addEventListener("pointerdown", e => {
        e.preventDefault();
        handle.setPointerCapture(e.pointerId);
        startX = e.clientX;
        startY = e.clientY;
        tileX = tile.x;
        tileY = tile.y;
        el.style.zIndex = 10;
      });

      handle.addEventListener("pointermove", e => {
        if (!handle.hasPointerCapture(e.pointerId)) return;
        const dx = (e.clientX - startX) / state.zoom;
        const dy = (e.clientY - startY) / state.zoom;
        const maxX = Math.max(0, board.clientWidth - el.offsetWidth);
        const rawX = clamp(tileX + dx, 0, maxX);
        const rawY = Math.max(0, tileY + dy);
        const snapped = snapToGrid(rawX, rawY);
        tile.x = snapped.x;
        tile.y = snapped.y;
        el.style.left = `${tile.x}px`;
        el.style.top = `${tile.y}px`;
        board.style.minHeight = `${Math.max(board.offsetHeight, tile.y + 180)}px`;
      });

      function endDrag(e) {
        if (handle.hasPointerCapture(e.pointerId)) handle.releasePointerCapture(e.pointerId);
        el.style.zIndex = "";
        saveStateSoon();
        setZoom(state.zoom);
      }
      handle.addEventListener("pointerup", endDrag);
      handle.addEventListener("pointercancel", endDrag);
    }

    function appendTrainingLogRow() {
      const now = new Date();
      const weekday = ["SO", "MO", "DI", "MI", "DO", "FR", "SA"][now.getDay()];
      const day = String(now.getDate()).padStart(2, "0");
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const year = now.getFullYear();
      const date = `${weekday} ${day}.${month}.${year}`;
      const time = now.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });

      const columns = state.tiles.map(t => t.name || "Kachel");
      const weights = state.tiles.map(t => Number.isFinite(Number(t.weight)) ? Number(t.weight) : "");

      if (!Array.isArray(state.history)) state.history = [];
      state.history.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        date,
        time,
        columns,

      });

    function getCurrentLogColumns() {
      const names = [];
      (state.history || []).forEach(row => {
        (row.columns || []).forEach(name => {
          if (!names.includes(name)) names.push(name);
        });
      });
      state.tiles.forEach(tile => {
        const name = tile.name || "Kachel";
        if (!names.includes(name)) names.push(name);
      });
      return names;
    }

    function renderLogTable() {
      const wrap = document.getElementById("logTableWrap");
      const rows = state.history || [];
      const columns = getCurrentLogColumns();

      if (!rows.length) {
        wrap.innerHTML = '<div class="empty">Noch keine Tabellenzeilen vorhanden.<br>Eine Zeile entsteht bei „Markierungen zurücksetzen“.</div>';
        return;
      }

      const escapeHtml = value => String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

      let out = '<table class="log-table"><thead><tr><th>Datum</th><th>Uhrzeit</th>';
      columns.forEach(col => out += `<th>${escapeHtml(col)}</th>`);
      out += '</tr></thead><tbody>';

      rows.forEach(row => {
        out += `<tr><td>${escapeHtml(row.date)}</td><td>${escapeHtml(row.time)}</td>`;
        columns.forEach(col => {
          const idx = (row.columns || []).indexOf(col);
          const val = idx >= 0 ? row.weights?.[idx] : "";
          out += `<td>${escapeHtml(val === "" || val == null ? "" : val + " kg")}</td>`;
        });
        out += '</tr>';
      });

      out += '</tbody></table>';
      wrap.innerHTML = out;
    }

    function logToCsv() {
      const rows = state.history || [];
      const columns = getCurrentLogColumns();
      const csvEscape = value => {
        const s = String(value ?? "");
        return /[;"\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      };

      const lines = [];
      lines.push(["Datum", "Uhrzeit", ...columns].map(csvEscape).join(";"));

      rows.forEach(row => {
        const line = [row.date, row.time];
        columns.forEach(col => {
          const idx = (row.columns || []).indexOf(col);
          const val = idx >= 0 ? row.weights?.[idx] : "";
          line.push(val === "" || val == null ? "" : String(val).replace(".", ","));
        });
        lines.push(line.map(csvEscape).join(";"));
      });

      return "\ufeff" + lines.join("\n");
    }

    function downloadTrainingLogCsv() {
      const csv = logToCsv();
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const timestamp = new Date().toISOString().slice(0, 19).replace(/[T:]/g, "-");
      const a = document.createElement("a");
      a.href = url;
      a.download = `tile-board-trainingsprotokoll-${timestamp}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 30000);

    function safeFilenamePart(text) {
      return String(text || "foto")
        .normalize("NFKD")
        .replace(/[^\wäöüÄÖÜß-]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .slice(0, 60) || "foto";
    }

    function dataUrlToBlob(dataUrl) {
      const parts = dataUrl.split(",");
      const mimeMatch = parts[0].match(/:(.*?);/);
      const mime = mimeMatch ? mimeMatch[1] : "image/jpeg";
      const binary = atob(parts[1]);
      const len = binary.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
      return new Blob([bytes], { type: mime });
    }

    async function downloadAllPhotosAsZip() {
      try {
        if (!state.photos.length) return true;

        if (!window.JSZip) {
          alert("ZIP-Modul nicht geladen. Bitte Internetverbindung prüfen und die Seite neu laden.");
          return false;
        }

        const zip = new JSZip();

        state.photos.forEach((photo, index) => {
          const tileName = safeFilenamePart(photo.tileName || "Kachel");
          const stamp = safeFilenamePart(photo.timestamp || String(index + 1));
          const filename = `${String(index + 1).padStart(2, "0")}_${tileName}_${stamp}.jpg`;
          zip.file(filename, dataUrlToBlob(photo.dataUrl));
        });

        const info = [
          "Tile Board Fotoexport",
          `Export: ${new Date().toLocaleString("de-DE")}`,
          `Anzahl Fotos: ${state.photos.length}`,
          "",
          "Nach dem Download wurden die Fotos aus dem Browser-Speicher entfernt."
        ].join("\n");
        zip.file("INFO.txt", info);

        const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
        const url = URL.createObjectURL(blob);

        const timestamp = new Date().toISOString().slice(0, 19).replace(/[T:]/g, "-");
        const a = document.createElement("a");
        a.href = url;
        a.download = `tile-board-fotos-${timestamp}.zip`;
        document.body.appendChild(a);
        a.click();
        a.remove();

        setTimeout(() => URL.revokeObjectURL(url), 30000);
        return true;
      } catch (e) {
        console.error(e);
        return false;
      }
    }

    async function capturePhoto() {
      const tile = state.tiles.find(t => t.id === activeTileId);
      const video = document.getElementById("video");
      const note = document.getElementById("ocrNote");
      const captureBtn = document.getElementById("captureBtn");
      if (!tile || !video.videoWidth) return;

      const oldButtonText = captureBtn.textContent;
      captureBtn.textContent = "Ausgelöst …";
      captureBtn.classList.add("capture-active");
      captureBtn.disabled = true;
      note.textContent = "Foto wird verarbeitet …";

      const zoom = Number(state.lens || 1);
      const sourceW = video.videoWidth / zoom;
      const sourceH = video.videoHeight / zoom;
      const sx = (video.videoWidth - sourceW) / 2;
      const sy = (video.videoHeight - sourceH) / 2;

      const canvas = document.createElement("canvas");
      const targetW = 850;
      const targetH = Math.round(targetW * sourceH / sourceW);
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext("2d");

      ctx.drawImage(video, sx, sy, sourceW, sourceH, 0, 0, targetW, targetH);

      let detectedWeight = null;
      try {
        note.textContent = "Trainingsgewicht wird gesucht …";
        detectedWeight = await detectWeightFromCanvas(canvas);
        if (detectedWeight !== null) {
          tile.weight = detectedWeight;
          note.textContent = `Erkannt: ${detectedWeight} kg`;
        } else {
          note.textContent = "Kein Gewicht sicher erkannt.";
        }
      } catch (e) {
        note.textContent = "OCR-Erkennung nicht möglich.";
      }

      const date = new Date();
      const timestamp = date.toLocaleString("de-DE", {
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit"
      });

      const pad = Math.round(targetW * 0.035);
      const barH = Math.round(targetW * 0.14);
      ctx.fillStyle = "rgba(0,0,0,.58)";
      ctx.fillRect(0, targetH - barH, targetW, barH);

      ctx.fillStyle = "white";
      ctx.font = `800 ${Math.round(targetW * 0.04)}px system-ui, sans-serif`;
      ctx.fillText(tile.name, pad, targetH - barH + Math.round(targetW * 0.052));

      ctx.fillStyle = "rgba(255,255,255,.78)";
      ctx.font = `600 ${Math.round(targetW * 0.027)}px system-ui, sans-serif`;
      const weightText = detectedWeight !== null ? ` · ${detectedWeight} kg erkannt` : "";
      ctx.fillText(timestamp + weightText, pad, targetH - barH + Math.round(targetW * 0.097));

      const dataUrl = canvas.toDataURL("image/jpeg", 0.68);
      const photo = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        tileId: tile.id,
        tileName: tile.name,
        timestamp,
        lens: zoom,
        detectedWeight,
        createdAt: Date.now(),
        dataUrl
      };
      state.photos.unshift(photo);
      tile.photoId = photo.id;
      await savePhotoToDb(photo);
      saveState();

      setTimeout(() => {
        captureBtn.disabled = false;
        captureBtn.textContent = oldButtonText;
        captureBtn.classList.remove("capture-active");
        note.textContent = "";
        closeCamera();
        renderBoard();
      }, detectedWeight !== null ? 700 : 1100);
    }

    async function detectWeightFromCanvas(sourceCanvas) {
      if (!window.Tesseract) return null;

      const ocrCanvas = document.createElement("canvas");
      const maxW = 1400;
      const scale = Math.min(1.3, maxW / sourceCanvas.width);
      ocrCanvas.width = Math.round(sourceCanvas.width * scale);
      ocrCanvas.height = Math.round(sourceCanvas.height * scale);
      const octx = ocrCanvas.getContext("2d", { willReadFrequently: true });
      octx.drawImage(sourceCanvas, 0, 0, ocrCanvas.width, ocrCanvas.height);

      const img = octx.getImageData(0, 0, ocrCanvas.width, ocrCanvas.height);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const gray = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
        const boosted = gray > 130 ? 255 : 0;
        d[i] = d[i + 1] = d[i + 2] = boosted;
      }
      octx.putImageData(img, 0, 0);

      const result = await Tesseract.recognize(ocrCanvas, "eng", {
        tessedit_char_whitelist: "0123456789.,kgKG "
      });

      const text = (result?.data?.text || "")
        .replace(/[,]/g, ".")
        .replace(/\s+/g, " ")
        .trim();

      return extractLikelyKg(text);
    }

    function extractLikelyKg(text) {
      if (!text) return null;

      const candidates = [];
      const kgRegex = /(?:^|\D)(\d{1,3}(?:\.\d{1,2})?)\s*(?:k|kg|KG|Kg)(?:\D|$)/g;
      let m;

      while ((m = kgRegex.exec(text)) !== null) {
        candidates.push(Number(m[1]));
      }

      if (!candidates.length) {
        const numRegex = /(?:^|\D)(\d{1,3}(?:\.\d{1,2})?)(?:\D|$)/g;
        while ((m = numRegex.exec(text)) !== null) {
          candidates.push(Number(m[1]));
        }
      }

      const plausible = candidates
        .filter(n => Number.isFinite(n))
        .filter(n => n >= 1 && n <= 250)
        .map(n => Math.round(n));

      if (!plausible.length) return null;

      plausible.sort((a, b) => {
        const aScore = (a % 5 === 0 ? 0 : 1);
        const bScore = (b % 5 === 0 ? 0 : 1);
        return aScore - bScore;
      });

      return plausible[0];
    }

    document.getElementById("showStorageInfo").addEventListener("click", async () => {
      menu.classList.remove("open");
      const raw = localStorage.getItem(STORAGE_KEY) || "";
      const localBytes = new Blob([raw]).size;
      const photoBytes = state.photos.reduce((sum, p) => sum + Math.round((p.dataUrl?.length || 0) * 0.75), 0);
      const estimate = await estimateBrowserStorage();

      let msg =
        `App-Daten localStorage: ${(localBytes / 1024).toFixed(1)} KB\n` +
        `Fotos IndexedDB ca.: ${(photoBytes / 1024 / 1024).toFixed(2)} MB\n` +
        `Fotos: ${state.photos.length}`;

      if (estimate) {
        msg +=
          `\n\nBrowser gesamt benutzt: ${((estimate.usage || 0) / 1024 / 1024).toFixed(1)} MB` +
          `\nVerfügbares Kontingent: ${((estimate.quota || 0) / 1024 / 1024).toFixed(1)} MB`;
      }

      alert(msg);
    });

    document.getElementById("openLogTable").addEventListener("click", () => {
      menu.classList.remove("open");
      renderLogTable();
      document.getElementById("logOverlay").classList.add("open");
    });

    document.getElementById("closeLogTable").addEventListener("click", () => {
      document.getElementById("logOverlay").classList.remove("open");
    });

    document.getElementById("downloadLogCsv").addEventListener("click", downloadTrainingLogCsv);

    document.getElementById("clearLogTable").addEventListener("click", () => {
      if (!confirm("Trainingsprotokoll wirklich löschen?")) return;
      state.history = [];
      renderLogTable();
      saveState();
    });

    document.getElementById("openGallery").addEventListener("click", () => {
      menu.classList.remove("open");
      renderGallery();
      document.getElementById("galleryOverlay").classList.add("open");
    });

    document.getElementById("closeGallery").addEventListener("click", () => {
      document.getElementById("galleryOverlay").classList.remove("open");
    });

    function renderGallery() {
      const grid = document.getElementById("galleryGrid");
      grid.innerHTML = "";
      if (!state.photos.length) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1">Noch keine Fotos vorhanden.</div>`;
        return;
      }
      state.photos.forEach(photo => {
        const card = document.createElement("div");
        card.className = "photo-card";
        card.innerHTML = `<img src="${photo.dataUrl}" alt=""><div>${photo.tileName} · ${photo.timestamp}</div>`;
        card.addEventListener("click", () => openLightbox(photo.id));
        grid.appendChild(card);
      });
    }

    function openLightbox(photoId) {
      const photo = state.photos.find(p => p.id === photoId);
      if (!photo) return;
      activePhotoId = photoId;
      document.getElementById("lightboxTitle").textContent = `${photo.tileName} · ${photo.timestamp}`;
      document.getElementById("lightboxImg").src = photo.dataUrl;
      document.getElementById("lightboxOverlay").classList.add("open");
    }

    document.getElementById("closeLightbox").addEventListener("click", () => {
      document.getElementById("lightboxOverlay").classList.remove("open");
      activePhotoId = null;
    });

    document.getElementById("downloadPhoto").addEventListener("click", () => {
      const photo = state.photos.find(p => p.id === activePhotoId);
      if (!photo) return;
      const a = document.createElement("a");
      const safeName = (photo.tileName || "foto").replace(/[^\wäöüÄÖÜß-]+/g, "_");
      a.href = photo.dataUrl;
      a.download = `${safeName}_${photo.timestamp.replace(/[^\d]/g, "")}.jpg`;
      a.click();
    });

    document.getElementById("deletePhoto").addEventListener("click", async () => {
      if (!activePhotoId) return;
      if (!confirm("Dieses Foto löschen?")) return;
      await deletePhotoFromDb(activePhotoId);
      state.photos = state.photos.filter(p => p.id !== activePhotoId);
      state.tiles.forEach(t => {
        if (t.photoId === activePhotoId) {
          const replacement = state.photos.find(p => p.tileId === t.id);
          t.photoId = replacement?.id || null;
        }
      });
      activePhotoId = null;
      document.getElementById("lightboxOverlay").classList.remove("open");
      renderGallery();
      renderBoard();
      saveState();
    });

    window.addEventListener("resize", () => {
      setZoom(state.zoom || 1);
    });

    async function initApp() {
      state.photos = await loadPhotosFromDb();
      renderBoard();
    }

    initApp();
  </script>
</body>
</html>
